function renderSpeedBanner(){
  const el=document.getElementById('speedBanner');if(!el)return;
  const a=gs.A,b=gs.B;
  if(!a.poke||!b.poke){
    el.innerHTML=`<span class="spd-banner-title">⚡ ORDEN DE TURNO</span>
      <div class="dmg-status" style="font-size:.75rem;width:100%;text-align:center;padding:.3rem 0">Selecciona ambos Pokémon para ver el orden de velocidad</div>`;
    return;
  }
  const spdA=applyBoost(a.finalStats.speed,a.boosts.speed);
  const spdB=applyBoost(b.finalStats.speed,b.boosts.speed);
  const nameA=fmtName(a.poke.name);
  const nameB=fmtName(b.poke.name);

  let clA,clB,lblA,lblB,tieNote='';
  if(spdA>spdB){
    clA='first';lblA='spd-first-lbl';clB='second';lblB='spd-second-lbl';
  } else if(spdB>spdA){
    clA='second';lblA='spd-second-lbl';clB='first';lblB='spd-first-lbl';
  } else {
    clA=clB='tie';lblA=lblB='spd-tie-lbl';
    tieNote='<div class="spd-footnote">⚖️ Velocidades iguales — el orden se decide aleatoriamente en batalla</div>';
  }
  const orderA=clA==='first'?'⚡ PRIMERO':clA==='second'?'🐢 SEGUNDO':'= EMPATE';
  const orderB=clB==='first'?'⚡ PRIMERO':clB==='second'?'🐢 SEGUNDO':'= EMPATE';

  // Check if any loaded moves have non-zero priority
  const allMvs=[...a.moves,...b.moves].filter(Boolean);
  const prioMvsA=a.moves.filter(Boolean).filter(m=>m.priority&&m.priority>0);
  const prioMvsB=b.moves.filter(Boolean).filter(m=>m.priority&&m.priority>0);
  const prioMvsMinus=[...a.moves,...b.moves].filter(Boolean).filter(m=>m.priority&&m.priority<0);
  const allPrioMvs=allMvs.filter(m=>m.priority&&m.priority!==0);

  let prioNote='';
  if(prioMvsA.length||prioMvsB.length){
    const lines=[];
    if(prioMvsA.length){
      const chips=prioMvsA.map(m=>`<span class="prio-chip">⚡ ${m.name} <b>+${m.priority}</b></span>`).join(' ');
      lines.push(`<strong style="color:var(--ra)">${nameA}</strong> usa un ataque con prioridad: ${chips} → <strong>ACTÚA PRIMERO sin importar la velocidad</strong>`);
    }
    if(prioMvsB.length){
      const chips=prioMvsB.map(m=>`<span class="prio-chip">⚡ ${m.name} <b>+${m.priority}</b></span>`).join(' ');
      lines.push(`<strong style="color:var(--rb)">${nameB}</strong> usa un ataque con prioridad: ${chips} → <strong>ACTÚA PRIMERO sin importar la velocidad</strong>`);
    }
    if(prioMvsA.length&&prioMvsB.length){
      lines.push(`<span style="color:#ffe040">⚖️ Ambos usan prioridad — desempate por velocidad normal</span>`);
    }
    prioNote=`<div class="spd-prio-override">⚡ PRIORIDAD ANULA LA VELOCIDAD<br>${lines.join('<br>')}</div>`;
  } else if(prioMvsMinus.length){
    const chips=prioMvsMinus.map(m=>`<span style="color:#ee7777">${m.name} (${m.priority})</span>`).join(', ');
    prioNote=`<div class="spd-footnote">🐢 Movimiento(s) de prioridad negativa: ${chips} — actuarán al <strong>final del turno</strong></div>`;
  }

  el.innerHTML=`
    <span class="spd-banner-title">⚡ ORDEN DE TURNO</span>
    <div class="spd-slot ${clA}">
      <span class="spd-name spd-name-a">${nameA}</span>
      <span class="spd-val">⚡ ${spdA}</span>
      <span class="spd-order-lbl ${lblA}">${orderA}</span>
    </div>
    <span class="spd-vs">VS</span>
    <div class="spd-slot ${clB}">
      <span class="spd-name spd-name-b">${nameB}</span>
      <span class="spd-val">⚡ ${spdB}</span>
      <span class="spd-order-lbl ${lblB}">${orderB}</span>
    </div>
    ${tieNote}${prioNote}`;
}

function calcTypeMatchups(types, ability){
  // For each attacking type, compute effectiveness vs this pokemon's types
  const matchups={immune:[],resist4:[],resist:[],weak2:[],weak4:[]};
  for(const atkT of ALL_TYPES){
    const eff=getTE(atkT,types,ability);
    if(eff===0)matchups.immune.push(atkT);
    else if(eff<=0.25)matchups.resist4.push(atkT);
    else if(eff<1)matchups.resist.push(atkT);
    else if(eff>=4)matchups.weak4.push(atkT);
    else if(eff>=2)matchups.weak2.push(atkT);
  }
  return matchups;
}

function renderTypeMatchupSection(types, ability){
  const m=calcTypeMatchups(types, ability);
  const chip=(t)=>{const c=TC2[t]||{bg:'#888',tx:'#fff'};return`<span class="mt-chip" style="background:${c.bg};color:${c.tx}">${TYPE_ES[t]||t}</span>`};
  const rows=[];
  if(m.weak4.length) rows.push(`<div class="matchup-group"><span class="matchup-lbl weak4">❌ Débil ×4</span><div class="matchup-chips">${m.weak4.map(chip).join('')}</div></div>`);
  if(m.weak2.length) rows.push(`<div class="matchup-group"><span class="matchup-lbl weak2">⚠️ Débil ×2</span><div class="matchup-chips">${m.weak2.map(chip).join('')}</div></div>`);
  if(m.resist4.length)rows.push(`<div class="matchup-group"><span class="matchup-lbl resist4">🛡 Resiste ×¼</span><div class="matchup-chips">${m.resist4.map(chip).join('')}</div></div>`);
  if(m.resist.length) rows.push(`<div class="matchup-group"><span class="matchup-lbl resist">🛡 Resiste ×½</span><div class="matchup-chips">${m.resist.map(chip).join('')}</div></div>`);
  if(m.immune.length) rows.push(`<div class="matchup-group"><span class="matchup-lbl immune">⛔ Inmune</span><div class="matchup-chips">${m.immune.map(chip).join('')}</div></div>`);
  if(!rows.length) return '';
  return`<div class="type-matchup-section">
    <div class="type-matchup-hdr">MATCHUP DE TIPOS</div>
    <div class="matchup-row">${rows.join('')}</div>
  </div>`;
}

      <td><input class="st-inp" id="ev${s}${st.key}" type="number" min="0" max="252" value="${sd.evs[st.key]}" oninput="setEv('${s}','${st.key}',this.value)"></td>
      <td>${st.key!=='hp'?`<input class="boost-inp" id="bst${s}${st.key}" type="number" min="-6" max="6" value="${sd.boosts[st.key]||0}" oninput="setBoost('${s}','${st.key}',this.value)">`:'—'}</td>
      <td class="td-fin" id="fin${s}${st.key}" style="color:${st.color}">—</td>

    <div class="ev-foot"><span class="ev-ft-lbl">EVs:</span><div class="ev-bg"><div class="ev-fill" id="evFill${s}"></div></div><span class="ev-ct" id="evCt${s}">0/510</span></div>`;
}
function getItemStatNote(itemKey, stat, weather, terrain, pokeName){
  const notes = {
    // Choice
    'choice-band':    {attack:'×1.5 🎀'},
    'choice-specs':   {'special-attack':'×1.5 🎀'},
    'choice-scarf':   {speed:'×1.5 🎀'},
    // Orb / bands / glasses
    'muscle-band':    {attack:'×1.1 💪'},
    'wise-glasses':   {'special-attack':'×1.1 🔍'},
    // Assault Vest / Eviolite
    'assault-vest':   {'special-defense':'×1.5 🦺'},
    'eviolite':       {defense:'×1.5 💎', 'special-defense':'×1.5 💎'},
    // Special Pokémon items
    'light-ball':     {attack:'×2 ⚡', 'special-attack':'×2 ⚡'},
    'thick-club':     {attack:'×2 🦴'},
    'deep-sea-tooth': {'special-attack':'×2 🦷'},
    'soul-dew':       {'special-attack':'×1.5 💧', 'special-defense':'×1.5 💧'},
    // Fur Coat / Pure Power already handled by ability — skip here
  };

  // Conditional: weather-dependent boosts already shown via abilityStatNote
  // Type-boost items (+20%) — only show on the stat they affect indirectly
  // (type items boost damage output, not raw stat, so we skip them here)

  return (notes[itemKey]&&notes[itemKey][stat])||'';
}

function updateStatDisplay(s){
  const sd=gs[s];if(!sd.poke)return;
  const nat=NATURES.find(n=>n.name===sd.nature)||NATURES[0];
  STATS.forEach(cfg=>{
    const k=cfg.key;const el=document.getElementById(`fin${s}${k}`);if(!el)return;
    const boost=k==='hp'?0:(sd.boosts[k]||0);
    const stat=sd.finalStats[k]??0;
    const eff=k==='hp'?stat:applyBoost(stat,boost);
    const nd=nat.b===k?'▲':nat.r===k?'▼':'';
    const bc=boost>0?'#77ee77':boost<0?'#ee7777':cfg.color;
    const ab=sd._activeAbility||sd.ability;
    const abilNote=getAbilityStatNote(ab,k,gs.weather,gs.terrain,sd.status,sd.finalStats,sd.item);
    const itemNote=getItemStatNote(sd.item,k,gs.weather,gs.terrain,sd.poke?.name);
    el.style.color=bc;
    el.innerHTML=eff+(nd?` <small style="color:${nd==='▲'?'#77ee77':'#ee7777'}">${nd}</small>`:'')+
      (boost!==0&&k!=='hp'?` <small style="color:${bc}">(${boost>0?'+':''}${boost})</small>`:'')+
      (abilNote?` <small style="color:#ffd700;font-size:.58rem">${abilNote}</small>`:'')+
      (itemNote?` <small style="color:#a0d8ff;font-size:.58rem">${itemNote}</small>`:'');
  });
  const total=Object.values(sd.evs).reduce((a,b)=>a+b,0);
  const fillEl=document.getElementById(`evFill${s}`);
  const ctEl=document.getElementById(`evCt${s}`);
  if(fillEl){fillEl.style.width=Math.min(total/510*100,100)+'%';fillEl.style.background=total>510?'#ee4444':total===510?'#ffd700':'#8899ff'}
  if(ctEl){ctEl.textContent=`${total}/510`;ctEl.className='ev-ct'+(total>510?' ev-over':total===510?' ev-maxed':'')}
}

// Type order for grouping (same visual order as type chart colors)
const TYPE_ORDER=['normal','fire','water','electric','grass','ice','fighting','poison','ground','flying','psychic','bug','rock','ghost','dragon','dark','steel','fairy'];

function setMoveSort(s,mode){
  gs[`moveSort${s}`]=mode;
  ['default','alpha','type','category'].forEach(m=>{
    const btn=document.getElementById(`mvSort${s}${m}`);
    if(btn)btn.classList.toggle('active',m===mode);
  });
}

function getSortedMoves(s,moves,q){
  const lq=(q||'').trim().toLowerCase();
  // Normalize accents for comparison
  const lqNorm=lq.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  function moveMatches(slug){
    if(slug.includes(lq))return true;
    const cached=gs.moveCache.get(slug);
    if(!cached)return false;
    const esLow=(cached.nameES||'').toLowerCase();
    const enLow=(cached.nameEN||'').toLowerCase();
    if(esLow.includes(lq)||enLow.includes(lq))return true;
    // Also match without accents
    const esNorm=esLow.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if(esNorm.includes(lqNorm))return true;
    return false;
  }
  let list=lq?moves.filter(moveMatches):moves;
  const mode=gs[`moveSort${s}`]||'default';
  if(mode==='alpha'){
    list=[...list].sort((a,b)=>{
      const na=gs.moveCache.get(a)?.name||a;
      const nb=gs.moveCache.get(b)?.name||b;
      return na.localeCompare(nb);
    });
  } else if(mode==='type'){
    list=[...list].sort((a,b)=>{
      const ta=gs.moveCache.get(a)?.type||'zzz';
      const tb=gs.moveCache.get(b)?.type||'zzz';
      const ia=TYPE_ORDER.indexOf(ta);
      const ib=TYPE_ORDER.indexOf(tb);
      if(ia!==ib)return(ia===-1?99:ia)-(ib===-1?99:ib);
      const na=gs.moveCache.get(a)?.name||a;
      const nb=gs.moveCache.get(b)?.name||b;
      return na.localeCompare(nb);
    });
  } else if(mode==='category'){
    const CAT_ORD=['physical','special','status'];
    list=[...list].sort((a,b)=>{
      const ca=gs.moveCache.get(a)?.category||'zzz';
      const cb=gs.moveCache.get(b)?.category||'zzz';
      const ia=CAT_ORD.indexOf(ca);const ib=CAT_ORD.indexOf(cb);
      if(ia!==ib)return(ia===-1?99:ia)-(ib===-1?99:ib);
      const na=gs.moveCache.get(a)?.name||a;const nb=gs.moveCache.get(b)?.name||b;
      return na.localeCompare(nb);
    });
  }
  return list;
}

function buildMoveItem(s,i,m){
  const cached=gs.moveCache.get(m);
  const displayLabel=cached?cached.name:fmtName(m);
  let typeChip='';
  if(cached&&cached.type){
    const tc=TC2[cached.type]||{bg:'#888',tx:'#fff'};
    typeChip=`<span class="mvdd-type-chip" style="background:${tc.bg};color:${tc.tx}">${TYPE_ES[cached.type]||cached.type}</span>`;
  }
  let catChip='';
  if(cached&&cached.category){
    const catSt=cached.category==='physical'?'background:#b03030;color:#fff':cached.category==='special'?'background:#2a5eaa;color:#fff':'background:#2e2e4a;color:#8888bb';
    const catLbl=cached.category==='physical'?'FIS':cached.category==='special'?'ESP':'EST';
    catChip=`<span class="mvdd-cat-chip" style="${catSt}">${catLbl}</span>`;
  }
  return`<div class="mv-dd-item" style="display:flex;align-items:center;gap:.4rem" onclick="pickMove('${s}',${i},'${m}')">${typeChip}${catChip}<span class="mvdd-name">${displayLabel}</span></div>`;
}

function initMoveSearch(s){
  const sd=gs[s];
  [0,1,2,3].forEach(i=>{
    const box=document.getElementById(`mbox${s}${i}`);
    const drop=document.getElementById(`mdrop${s}${i}`);
    if(!box||!drop)return;

    function renderMoveDropdown(q){
      const mode=gs[`moveSort${s}`]||'default';
      const hasQuery=!!(q||'').trim();
      // Only limit results when the user is actively searching with text.
      // When browsing by type or category we need ALL moves so no groups disappear.
      const limit=hasQuery?120:(mode==='type'||mode==='category')?9999:120;
      const sorted=getSortedMoves(s,sd.pokeMoves,q).slice(0,limit);
      if(!sorted.length){drop.classList.remove('open');return}
      if(mode==='type'){
        // Group by type with headers
        const groups={};
        sorted.forEach(m=>{
          const t=gs.moveCache.get(m)?.type||'???';
          if(!groups[t])groups[t]=[];
          groups[t].push(m);
        });
        let html='';
        // Render in type order
        const orderedTypes=[...TYPE_ORDER,'???'].filter(t=>groups[t]);
        orderedTypes.forEach(t=>{
          const tc=TC2[t]||{bg:'#555',tx:'#fff'};
          html+=`<div class="mv-type-group-hdr" style="color:${tc.bg}">${TYPE_ES[t]||t}</div>`;
          html+=groups[t].map(m=>buildMoveItem(s,i,m)).join('');
        });
        drop.innerHTML=html;
      } else if(mode==='category'){
        const cg={physical:[],special:[],status:[]};
        sorted.forEach(m=>{const c=gs.moveCache.get(m)?.category||'status';(cg[c]=cg[c]||[]).push(m);});
        const CL={physical:'FIS — Físico',special:'ESP — Especial',status:'EST — Estado'};
        const CC={physical:'#c05050',special:'#4a7ecc',status:'#5a5a8a'};
        let html='';
        ['physical','special','status'].forEach(c=>{
          if(!cg[c]||!cg[c].length)return;
          html+=`<div class="mv-type-group-hdr" style="color:${CC[c]}">${CL[c]}</div>`;
          html+=cg[c].map(m=>buildMoveItem(s,i,m)).join('');
        });
        drop.innerHTML=html;
      } else {
        drop.innerHTML=sorted.map(m=>buildMoveItem(s,i,m)).join('');
      }
      drop.classList.add('open');
    }

    box.addEventListener('focus',()=>renderMoveDropdown(box.value));
    box.addEventListener('click',()=>renderMoveDropdown(box.value));
    box.addEventListener('input',()=>renderMoveDropdown(box.value));
    box.addEventListener('keydown',e=>{if(e.key==='Escape')drop.classList.remove('open');if(e.key==='Enter'){const f=drop.querySelector('.mv-dd-item');if(f)f.click()}});
    document.addEventListener('click',e=>{if(!e.target.closest(`#mslot${s}${i}`)&&drop.classList.contains('open'))drop.classList.remove('open')},{passive:true});
  });
}

async function pickMove(s,slot,slug){
  const drop=document.getElementById(`mdrop${s}${slot}`);
  const box=document.getElementById(`mbox${s}${slot}`);
  drop.classList.remove('open');
  const mv=await loadMove(slug);
  gs[s].moves[slot]=mv;
  if(mv&&box)box.value=mv.name;
  updateMoveInfo(s,slot,mv);
  updateAll();
}

function updateMoveInfo(s,slot,mv){
  const el=document.getElementById(`minfo${s}${slot}`);if(!el)return;
  if(!mv){el.innerHTML='<span style="color:var(--tdim);font-size:.7rem">—</span>';return}
  const tc=TC2[mv.type]||{bg:'#888',tx:'#fff'};
  const catColor=CAT_COLOR[mv.category]||'#aaa';
  const descId=`mvdesc${s}${slot}`;
  el.innerHTML=`<span class="mv-type" style="background:${tc.bg};color:${tc.tx}">${TYPE_ES[mv.type]||mv.type}</span>`+
    `<span class="mv-cat" style="color:${catColor}">${CAT_ES[mv.category]||mv.category}</span>`+
    (mv.power?`<span class="mv-bp">BP:${mv.power}</span>`:'')+
    (mv.priority&&mv.priority!==0?`<span class="mv-prio">${mv.priority>0?'+':''}${mv.priority}prio</span>`:'')+
    `<span class="mv-desc" id="${descId}"></span>`;
  // Async load description
  fetchMoveDescription(mv.slug).then(desc=>{
    const el2=document.getElementById(descId);
    if(el2&&desc)el2.textContent=desc;
  });
}

function clearMove(s,slot){
  gs[s].moves[slot]=null;
  const box=document.getElementById(`mbox${s}${slot}`);if(box)box.value='';
  updateMoveInfo(s,slot,null);
  updateAll();
}

function renderDmgSection(atkSide,defSide,containerId){
  const atkr=gs[atkSide],defr=gs[defSide];
  const el=document.getElementById(containerId);if(!el)return;
  if(!atkr.poke||!defr.poke){el.innerHTML='<div class="dmg-status">Selecciona ambos Pokémon</div>';return}
  let html='';
  let hasMoves=false;
  atkr.moves.forEach((mv,i)=>{
    if(!mv){html+=`<div class="dmg-status dmg-immune">Movimiento ${i+1}: —</div>`;return}
    hasMoves=true;
    const res=calcDmg(atkSide,defSide,mv);
    html+=renderMoveResult(mv,res,i+1,atkSide);
  });
  if(!hasMoves)html='<div class="dmg-status">Selecciona movimientos para calcular el daño</div>';
  el.innerHTML=html;
}

function renderMoveResult(mv,res,num,atkSide){
  atkSide=atkSide||'A';
  const defSide=atkSide==='A'?'B':'A';
  const tc=TC2[mv.type]||{bg:'#888',tx:'#fff'};
  const catColor=CAT_COLOR[mv.category]||'#aaa';
  if(!res)return`<div class="dmg-move"><div class="dmg-move-top"><span class="mv-type" style="background:${tc.bg};color:${tc.tx}">${TYPE_ES[mv.type]||mv.type}</span><span class="dmg-move-name">${mv.name}</span><span style="color:${catColor};font-size:.65rem">${mv.category==='physical'?'⚔️ Fís.':mv.category==='special'?'🔮 Esp.':'💫 Est.'}</span></div><div class="dmg-status dmg-immune">Sin datos</div></div>`;
  if(res.status)return`<div class="dmg-move"><div class="dmg-move-top"><span class="mv-type" style="background:${tc.bg};color:${tc.tx}">${TYPE_ES[mv.type]||mv.type}</span><span class="dmg-move-name">${mv.name}</span><span style="color:#a7db8d;font-size:.65rem">💫 Estado</span></div><div class="dmg-status dmg-immune">Movimiento de estado — no hace daño directo</div></div>`;
  if(res.immune)return`<div class="dmg-move"><div class="dmg-move-top"><span class="mv-type" style="background:${tc.bg};color:${tc.tx}">${TYPE_ES[mv.type]||mv.type}</span><span class="dmg-move-name">${mv.name}</span></div><div class="dmg-status dmg-immune">🚫 Sin efecto (inmunidad de tipo)</div></div>`;
  if(res.ohko===true){
    // TRUE OHKO move (Fissure, Guillotine, Horn Drill, Sheer Cold)
    let oTurnBadgeTop='', oTurnBadge='';
    const oPrio=mv.priority||0;
    if(gs[atkSide].poke&&gs[defSide].poke){
      const oSpdA=applyBoost(gs[atkSide].finalStats.speed,gs[atkSide].boosts.speed);
      const oSpdD=applyBoost(gs[defSide].finalStats.speed,gs[defSide].boosts.speed);
      if(oPrio>0){oTurnBadgeTop=`<span class="turn-badge turn-prio-plus">⚡ PRIORIDAD +${oPrio} — PEGA PRIMERO</span>`;}
      else if(oPrio<0){oTurnBadge=`<span class="turn-badge turn-prio-minus">🐢 Prioridad ${oPrio} — pega al final</span>`;}
      else if(oSpdA>oSpdD){oTurnBadge=`<span class="turn-badge turn-first">⚡ Pega primero (${oSpdA} VEL)</span>`;}
      else if(oSpdD>oSpdA){oTurnBadge=`<span class="turn-badge turn-second">🐢 Pega segundo (${oSpdA} VEL)</span>`;}
      else{oTurnBadge=`<span class="turn-badge turn-tie">= Igual velocidad (${oSpdA} VEL)</span>`;}
    }
    const oSashMsg=res.sashBlocks
      ?`<span class="ko-badge ko-sash">✏️ Faja Focus — sobrevive con 1 HP (OKHO bloqueado)</span>`
      :`<span class="ko-badge ko-ohko">⚡ OKHO garantizado si conecta</span>`;
    const oBody=res.sashBlocks
      ?`<div class="dmg-status" style="color:#4ade80;margin-bottom:.35rem">✏️ Faja Focus — sobrevive con 1 HP</div>`
      :`<div class="dmg-status" style="color:#ff5555;margin-bottom:.35rem">⚡ Movimiento de OKHO — elimina al rival si conecta</div>`;
    return`<div class="dmg-move">
      <div class="dmg-move-top">
        <span class="mv-type" style="background:${tc.bg};color:${tc.tx}">${TYPE_ES[mv.type]||mv.type}</span>
        <span class="dmg-move-name">${mv.name}</span>
        ${oTurnBadgeTop}
        <span class="eff-badge eff-2se">OKHO Instantáneo</span>
        <span style="color:${catColor};font-size:.65rem;margin-left:auto">${mv.category==='physical'?'⚔️':mv.category==='special'?'🔮':'💫'}</span>
      </div>
      ${oBody}
      <div style="display:flex;gap:.35rem;flex-wrap:wrap;align-items:center">${oTurnBadge}</div>
      <div class="ko-info">${oSashMsg}</div>
    </div>`;
  }
  if(res.zHitsImmune)return`<div class="dmg-move"><div class="dmg-move-top"><span class="mv-type" style="background:${tc.bg};color:${tc.tx}">${TYPE_ES[mv.type]||mv.type}</span><span class="dmg-move-name">${mv.name}</span><span class="eff-badge eff-nve">Inmune</span><span class="badge-z">Z</span></div><div class="dmg-status" style="color:#ffe040">⚡ Z-Move vs tipo inmune — hace exactamente <b>1 HP</b> de daño</div></div>`;

  // Normal damage result
  const isMulti=res.hits&&(res.hits.length>1||res.hits[0]>1);
  const barColor=res.maxPct>=100?'#ff3333':res.maxPct>=66?'#ff7755':res.maxPct>=33?'#f5ac78':'#9db7f5';
  const barW=Math.min(res.maxPct,100);

  let effBadge='';
  if(res.eff==='4se')effBadge='<span class="eff-badge eff-2se">×4 SE</span>';
  else if(res.eff==='se')effBadge='<span class="eff-badge eff-se">×2 SE</span>';
  else if(res.eff==='nve')effBadge='<span class="eff-badge eff-nve">×0.5 NVE</span>';
  else if(res.eff==='4nve')effBadge='<span class="eff-badge eff-nve">×0.25 NVE</span>';

  let koBadges='';
  if(res.sashBlocks){
    // Sash intercepts any roll that would OHKO — show sash note instead
    const sashPct=res.ohko>=1?'garantizado':`${Math.round(res.ohko*16)}/16 (${(res.ohko*100).toFixed(0)}%)`;
    koBadges+=`<span class="ko-badge ko-sash">✏️ Faja Focus — sobrevive con 1 HP (OKHO ${sashPct} bloqueado)</span>`;
  } else if(res.ohko>=1)koBadges+=`<span class="ko-badge ko-ohko">⚡ OKHO garantizado</span>`;
  else if(res.ohko>0)koBadges+=`<span class="ko-badge ko-ohko">OKHO: ${Math.round(res.ohko*16)}/16 (${(res.ohko*100).toFixed(0)}%)</span>`;
  else if(res.twoHKO>=1)koBadges+=`<span class="ko-badge ko-2hko">2HKO garantizado</span>`;
  else if(res.twoHKO>0)koBadges+=`<span class="ko-badge ko-2hko">2HKO: ${Math.round(res.twoHKO*16)}/16 (${(res.twoHKO*100).toFixed(0)}%)</span>`;
  else if(res.threeHKO>=1)koBadges+=`<span class="ko-badge ko-3hko">3HKO garantizado</span>`;
  else if(res.threeHKO>0)koBadges+=`<span class="ko-badge ko-3hko">3HKO: ${Math.round(res.threeHKO*16)}/16 (${(res.threeHKO*100).toFixed(0)}%)</span>`;
  else koBadges+=`<span class="ko-badge ko-miss">No KO en 3 hits</span>`;

  let multiInfo='';
  if(isMulti){
    const hitsStr=res.hits.length===1?`${res.hits[0]} golpes`:`${Math.min(...res.hits)}–${Math.max(...res.hits)} golpes`;
    multiInfo=`<div style="font-size:.7rem;color:var(--tdim);margin-top:.25rem">Multi-hit (${hitsStr}) → <span style="color:var(--thi)">${res.multiMinPct}% – ${res.multiMaxPct}%</span></div>`;
  }

  // ── Turn order badge ──
  let turnBadge='';
  let turnBadgeTopRow=''; // shown in the header row for priority moves
  const prio=mv.priority||0;
  if(gs[atkSide].poke&&gs[defSide].poke){
    const spdAtk=applyBoost(gs[atkSide].finalStats.speed,gs[atkSide].boosts.speed);
    const spdDef=applyBoost(gs[defSide].finalStats.speed,gs[defSide].boosts.speed);
    if(prio>0){
      const badge=`<span class="turn-badge turn-prio-plus">⚡ PRIORIDAD +${prio} — PEGA PRIMERO</span>`;
      turnBadgeTopRow=badge; // place in header row
    } else if(prio<0){
      turnBadge=`<span class="turn-badge turn-prio-minus">🐢 Prioridad ${prio} — pega al final</span>`;
    } else if(spdAtk>spdDef){
      turnBadge=`<span class="turn-badge turn-first">⚡ Pega primero (${spdAtk} VEL)</span>`;
    } else if(spdDef>spdAtk){
      turnBadge=`<span class="turn-badge turn-second">🐢 Pega segundo (${spdAtk} VEL)</span>`;
    } else {
      turnBadge=`<span class="turn-badge turn-tie">= Igual velocidad (${spdAtk} VEL)</span>`;
    }
  }

  return`<div class="dmg-move">
    <div class="dmg-move-top">
      <span class="mv-type" style="background:${tc.bg};color:${tc.tx}">${TYPE_ES[mv.type]||mv.type}</span>
      <span class="dmg-move-name">${mv.name}</span>
      ${turnBadgeTopRow}
      ${res.seBoostActive?`<span class="turn-badge turn-se-boost">🔥 ×4/3 BONO SE</span>`:res.seBoostMove?`<span class="turn-badge turn-se-boost-warn">⚠️ sin bono SE</span>`:''}
      ${res.isDefBased?`<span class="turn-badge turn-def-boost">🛡️ USA TU DEF como ATQ</span>`:''}
      ${res.isOppAtk?`<span class="turn-badge turn-opp-atk">😈 USA ATQ del RIVAL</span>`:''}
      ${res.isWeightPow?`<span class="turn-badge turn-weight-pow">⚖️ BP por PESO rival${res.mechLabel?` (${res.mechLabel})`:''}</span>`:''}
      ${res.isHeavySlam?`<span class="turn-badge turn-heavy-slam">🏋️ BP por RATIO de PESOS${res.mechLabel?` (${res.mechLabel})`:''}</span>`:''}

// Pokemon Spanish name overrides (Gen 8/9 names PokeAPI lacks in ES)

// Sprites del dropdown:
// - Pokémon normales (ID <= 10000): smallUrl por ID (rápido, correcto)
// - Formas especiales (ID > 10000): sprite de Pokémon Showdown por NOMBRE
//   porque sus sprites están indexados por nombre (igual que PokeAPI), no por ID numérico.
//   Los IDs de forma en PokeAPI/sprites cambian entre versiones y no son confiables.
function ddPokeSpriteUrl(name, id) {
  if (typeof id === 'number' && id > 10000) {
    return `https://play.pokemonshowdown.com/sprites/gen5/${name}.png`;
  }
  return smallUrl(id);
}
function ddPokeImgError(img, name, id) {
  img.onerror = null;
  // Fallback 1: artUrl por ID
  const artSrc = artUrl(id);
  if (img.src !== artSrc) {
    img.src = artSrc;
    img.onerror = () => {
      img.onerror = null;
      // Fallback 2: smallUrl (por si artUrl también falla en formas)
      const sm = smallUrl(id);
      if (img.src !== sm) { img.src = sm; img.onerror = () => { img.style.display='none'; }; }
      else { img.style.display = 'none'; }
    };
  } else {
    img.style.display = 'none';
  }
}

function initSearch(s){
  const box=document.getElementById(`sBox${s}`);
  const drop=document.getElementById(`drop${s}`);
  if(!box||!drop)return;
  box.addEventListener('input',()=>{
    const raw=box.value.trim().toLowerCase();
    if(!raw){drop.classList.remove('open');return}
    // Normalize spaces to dashes so "iron valiant" matches "iron-valiant"
    const q=raw.replace(/\s+/g,'-');
    // Also match Spanish names and pretty English names
    // Palabras individuales del query (para búsqueda en orden invertido: "mega feraligatr" → "feraligatr-mega")
    const rawWords=raw.split(/\s+/);
    const qWordsRev=rawWords.length>1?[...rawWords].reverse().join('-'):'';
    const hits=gs.pList.filter(p=>{
      if(p.name.includes(q)||String(p.id)===raw)return true;
      // Orden invertido: "mega feraligatr" encuentra "feraligatr-mega"
      if(qWordsRev&&p.name.includes(qWordsRev))return true;
      const es=(POKE_ES[p.name]||'').toLowerCase();
      if(es.includes(raw))return true;
      const esNoAccent=es.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if(esNoAccent.includes(raw))return true;
      const en=fmtName(p.name).toLowerCase();
      if(en.includes(raw))return true;
      // Cada palabra del query aparece en el nombre (todas deben estar, en cualquier orden)
      if(rawWords.length>1&&rawWords.every(w=>p.name.includes(w)||(POKE_ES[p.name]||'').toLowerCase().includes(w)))return true;
      return false;
    }).slice(0,28);
    if(!hits.length){drop.classList.remove('open');return}
    // Also inject mega/primal/crowned forms that match the query
    const formHits=Object.keys(FORM_SPRITE_IDS).filter(fn=>{
      const fq=(fn+' '+(POKE_ES[fn]||'')+' '+(fmtName(fn)||'')).toLowerCase();
      if(fq.includes(q)||fq.includes(raw))return true;
      if(qWordsRev&&fq.includes(qWordsRev))return true;
      if(rawWords.length>1&&rawWords.every(w=>fq.includes(w)))return true;
      return false;
    }).map(fn=>({name:fn,id:FORM_SPRITE_IDS[fn]}));
    const allHits=[...hits,...formHits.filter(f=>!hits.find(h=>h.name===f.name))].slice(0,32);
    // Showdown sprites para formas (nombre-indexados), smallUrl para normales
    drop.innerHTML=allHits.map(p=>`<div class="dd-item" onclick="selectPokemon('${s}','${p.name}')"><img src="${ddPokeSpriteUrl(p.name,p.id)}" loading="lazy" onerror="ddPokeImgError(this,'${p.name}',${p.id})"><span>${fmtName(p.name)}</span><span class="dd-num">${padId(p.id)}</span></div>`).join('');
    drop.classList.add('open');
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.s-wrap'))drop.classList.remove('open')},{passive:true});
  box.addEventListener('keydown',e=>{if(e.key==='Escape')drop.classList.remove('open');if(e.key==='Enter'){const f=drop.querySelector('.dd-item');if(f)f.click()}});
}

function selectPokemon(s,name){
  const drop=document.getElementById(`drop${s}`);
  const box=document.getElementById(`sBox${s}`);
  if(drop)drop.classList.remove('open');
  if(box)box.value=fmtName(name);
  // Reset moves
  gs[s].moves=[null,null,null,null];
  [0,1,2,3].forEach(i=>{const b=document.getElementById(`mbox${s}${i}`);if(b)b.value='';updateMoveInfo(s,i,null)});
  loadPokemon(s,name);
}

// ══════════════════════════════════════════════════════════════════
//  AUTO CONDITIONS
// ══════════════════════════════════════════════════════════════════
function checkAutoConditions(){
  const wSel=document.getElementById('weatherSel');
  const tSel=document.getElementById('terrainSel');
  const weatherSrcTag=document.getElementById('weatherSrcTag');
  const terrainSrcTag=document.getElementById('terrainSrcTag');

  // Collect all sources for weather and terrain separately
  const weatherSources=[];
  const terrainSources=[];
  for(const side of ['A','B']){
    const sd=gs[side];
    const ab=sd.ability;
    if(WEATHER_ABL[ab]) weatherSources.push({cond:WEATHER_ABL[ab],ab,side});
    if(TERRAIN_ABL[ab]) terrainSources.push({cond:TERRAIN_ABL[ab],ab,side});
  }

  // ── WEATHER ──
  // If both sides set weather: slowest pokemon wins (acts second, overwrites)
  // Speed is already calculated in finalStats; fallback to base speed if not ready
  function getSpeed(side){
    const fs=gs[side].finalStats;
    if(fs&&fs.speed)return fs.speed;
    return gs[side].poke?.base?.speed||0;
  }

  if(weatherSources.length===0){
    // No ability sets weather — clear auto weather
    if(gs.weatherAutoSource){
      gs.weather='none';
      gs.weatherAutoSource=null;
      if(wSel){wSel.value='none';wSel.classList.remove('auto-locked');wSel.disabled=false;}
      if(weatherSrcTag){weatherSrcTag.style.display='none';}
    }
  } else {
    // Pick the slowest source (slowest = acts last = overwrites)
    let winner=weatherSources[0];
    if(weatherSources.length>1){
      const spdA=getSpeed(weatherSources[0].side);
      const spdB=getSpeed(weatherSources[1].side);
      // Lower speed = slower = wins; tie: side B wins (goes second by convention)
      if(spdA < spdB) winner=weatherSources[0];
      else if(spdB < spdA) winner=weatherSources[1];
      else winner=weatherSources.find(s=>s.side==='B')||weatherSources[1];
    }
    gs.weather=winner.cond;
    gs.weatherAutoSource=winner;
    if(wSel){wSel.value=winner.cond;wSel.classList.add('auto-locked');wSel.disabled=true;}
    if(weatherSrcTag){
      weatherSrcTag.textContent=`🤖 ${fmtAbilBilingual(winner.ab)} (${winner.side})`;
      weatherSrcTag.style.display='inline-block';
    }
  }

  // ── TERRAIN ──
  if(terrainSources.length===0){
    // No ability sets terrain — clear auto terrain
    if(gs.terrainAutoSource){
      gs.terrain='none';
      gs.terrainAutoSource=null;
      if(tSel){tSel.value='none';tSel.classList.remove('auto-locked');tSel.disabled=false;}
      if(terrainSrcTag){terrainSrcTag.style.display='none';}
    }
  } else {
    let winner=terrainSources[0];
    if(terrainSources.length>1){
      const spdA=getSpeed(terrainSources[0].side);
      const spdB=getSpeed(terrainSources[1].side);
      if(spdA < spdB) winner=terrainSources[0];
      else if(spdB < spdA) winner=terrainSources[1];
      else winner=terrainSources.find(s=>s.side==='B')||terrainSources[1];
    }
    gs.terrain=winner.cond;
    gs.terrainAutoSource=winner;
    if(tSel){tSel.value=winner.cond;tSel.classList.add('auto-locked');tSel.disabled=true;}
    if(terrainSrcTag){
      terrainSrcTag.textContent=`🤖 ${fmtAbilBilingual(winner.ab)} (${winner.side})`;
      terrainSrcTag.style.display='inline-block';
    }
  }

  // ── Climate + Terrain can now coexist freely ──
  // (no mutual exclusion between weather and terrain)

  updateCondIndicator();
}

function resetAll(){
  gs.weather='none';gs.terrain='none';gs.weatherAutoSource=null;gs.terrainAutoSource=null;
  gs._autoSeq=0;gs.reflect=false;gs.lightScreen=false;gs.auroraVeil=false;gs.helpingHand=false;gs.isCrit=false;
  gs.moveSortA='default';gs.moveSortB='default';
  gs.A=mkSide();gs.B=mkSide();
  buildCondBar();
  buildPanel('A');
  buildPanel('B');
  buildTeraSelects();
  setLevel('A',100);
  setLevel('B',100);
  if(gs.pList&&gs.pList.length>0){onListReady();}
  buildDmgZone();
  updateAll();
}

// ══════════════════════════════════════════════════════════════════
//  EVENT HANDLERS
// ══════════════════════════════════════════════════════════════════
function setLevel(s,v){
  v=Math.min(200,Math.max(1,parseInt(v)||1));
  gs[s].level=v;
  const rng=document.getElementById(`lvlRange${s}`);
  const num=document.getElementById(`lvlNum${s}`);
  if(rng){rng.value=v;rng.style.setProperty('--pct',((v-1)/199*100).toFixed(2)+'%')}
  if(num)num.value=v;
  updateAll();
}
function setHPPct(s,v){
  v=Math.max(1,Math.min(100,parseInt(v)||100));
  const rangeEl=document.getElementById('hpRange'+s);
  const numEl=document.getElementById('hpNum'+s);
  const lblEl=document.getElementById('hpLabel'+s);
  if(rangeEl){rangeEl.value=v;rangeEl.style.setProperty('--pct',((v-1)/99*100).toFixed(2)+'%');}
  if(numEl)numEl.value=v;
  gs[s].currentHPPct=v;
  if(lblEl){lblEl.textContent=v>=100?'HP máx':v<=33?'¡Zona pinchazo!':v+'%';lblEl.style.color=v<=33?'#f5ac78':v>=100?'var(--tdim)':'var(--text)';}
  updateAll();
}
function setNature(s,v){gs[s].nature=v;updateAll()}
function setItem(s,v){gs[s].item=v;updateAll()}
function setAbility(s,v){gs[s].ability=v;gs[s]._autoSeq=(gs._autoSeq||0)+1;gs[s]._autoOrder=gs[s]._autoSeq;checkAutoConditions();updateTypeMatchupDisplay(s);updateAll()}
function setStatus(s,v){gs[s].status=v;updateAll()}
function toggleShiny(s){
  gs[s].shiny=!gs[s].shiny;
  document.getElementById(`tog${s}`).classList.toggle('on',gs[s].shiny);
  updatePanelSprite(s);
}
function setIv(s,k,v){
  let val=Math.min(31,Math.max(0,parseInt(v)||0));
  gs[s].ivs[k]=val;
  const el=document.getElementById(`iv${s}${k}`);if(el)el.value=val;
  updateAll();
}
function setEv(s,k,v){
  let val=Math.min(252,Math.max(0,parseInt(v)||0));
  const rest=Object.entries(gs[s].evs).reduce((sum,[ek,ev])=>ek===k?sum:sum+ev,0);
  if(rest+val>510)val=Math.max(0,510-rest);
  gs[s].evs[k]=val;
  const el=document.getElementById(`ev${s}${k}`);if(el)el.value=val;
  updateAll();
}
function setBoost(s,k,v){
  gs[s].boosts[k]=Math.min(6,Math.max(-6,parseInt(v)||0));
  updateAll();
}
function setCond(key,val){
  // Don't override if currently auto-locked by ability
  if(key==='weather'){
    const wSel=document.getElementById('weatherSel');
    if(wSel&&wSel.disabled){wSel.value=gs.weather;return}
  }
  if(key==='terrain'){
    const tSel=document.getElementById('terrainSel');
    if(tSel&&tSel.disabled){tSel.value=gs.terrain;return}
  }
  gs[key]=val;
  if(key==='weather')gs.weatherAutoSource=null;
  if(key==='terrain')gs.terrainAutoSource=null;
  // Update weather/terrain active indicator
  updateCondIndicator();
  updateAll();
}
function updateCondIndicator(){
  const badge=document.getElementById('autoBadge');
  if(!badge)return;
  const WEATHER_EFFECTS={
    rain:'🌧️ Lluvia — Agua ×1.5 · Fuego ×0.5',
    sun:'☀️ Sol — Fuego ×1.5 · Agua ×0.5',
    sand:'🌪️ Arena — SpDef Roca ×1.5',
    snow:'❄️ Nevada — Eva. Hielo +1',
  };
  const tNames={electric:'⚡ T. Eléctrico',grassy:'🌿 T. Gramíneo',misty:'🌫️ T. Neblinoso',psychic:'🔮 T. Psíquico'};
  const parts=[];
  if(gs.weather!=='none')parts.push(WEATHER_EFFECTS[gs.weather]||gs.weather);
  if(gs.terrain!=='none')parts.push(tNames[gs.terrain]||gs.terrain);
  if(parts.length){badge.textContent=parts.join(' · ');badge.classList.add('show')}
  else{badge.classList.remove('show')}
}
function toggleCond(key,el){
  gs[key]=el.checked;
  const label=el.closest('.ctog');
  if(label)label.classList.toggle('active',el.checked);
  updateAll();
}
